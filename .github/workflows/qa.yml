name: QA OfertaGen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Tests unitarios e integración (rápidos)
  test-unit:
    name: Tests Unitarios
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests QA (193 assertions)
        run: npm test

      - name: Build Next.js
        run: npm run build

  # Job 2: Tests E2E con Playwright
  test-e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test-unit  # Solo corre si unitarios pasan
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Ejecutar tests E2E
        run: npm run test:e2e -- --project=chromium
        env:
          CI: true

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Subir screenshots de fallos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
